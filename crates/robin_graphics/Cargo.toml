[package]
name = "robin_graphics"
version = "0.1.0"
edition = "2024"

[features]
trace = []


[dependencies]
wgpu = { version = "28", default-features = false, features = [
    "wgsl",
    "dx12",
    "metal",
    "vulkan",
    "naga-ir",
    "fragile-send-sync-non-atomic-wasm",
] }

bevy = { workspace = true,  features = ["bevy_render"]}
